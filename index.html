<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的筆記區</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#6366f1', background: '#f8fafc', surface: '#ffffff' }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar:hover::-webkit-scrollbar-thumb { background-color: #94a3b8; }
        .custom-scrollbar { scrollbar-width: thin; scrollbar-color: #cbd5e1 transparent; }
        
        .loader { border-top-color: transparent; animation: spin 1s linear infinite; border-radius: 50%; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .todo-checked { text-decoration: line-through; color: #94a3b8; }
        .hide-completed-mode .todo-item-completed { display: none !important; }

        .sortable-ghost { opacity: 0.3; }
        .sortable-drag { cursor: grabbing !important; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        
        body.is-dragging .sortable-list { position: relative; min-height: 80px; }
        body.is-dragging .sortable-list::after {
            content: '\f067  加入 ' attr(data-name);
            font-family: "Font Awesome 6 Free", "Noto Sans TC";
            font-weight: 900;
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; color: #6366f1; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(2px);
            border: 2px dashed #6366f1; border-radius: 0.75rem; z-index: 50; opacity: 0; pointer-events: none; transition: all 0.2s ease;
        }
        body.is-dragging .sortable-list.is-dragover::after { opacity: 1; }
    </style>
</head>
<body class="bg-background text-slate-800 font-sans min-h-screen p-4 md:p-8 relative">

    <div class="max-w-5xl mx-auto">
        <!-- 頂部標題區 -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">

                <button id="settings-btn" class="md:ml-4 text-slate-400 hover:text-slate-600 transition-colors bg-white p-2 rounded-full shadow-sm border border-slate-100"><i class="fas fa-cog"></i></button>
            </div>
            
            <div class="flex items-center gap-3 bg-white px-4 py-2 rounded-xl border border-slate-200 shadow-sm w-full md:w-auto justify-between md:justify-end">
                <div class="flex items-center gap-2">
                    <span id="auth-status" class="w-2.5 h-2.5 rounded-full bg-amber-500 shadow-inner shrink-0"></span>
                    <span id="auth-text" class="text-slate-600 text-sm font-medium truncate max-w-[150px]">等待登入...</span>
                </div>
                <button id="login-btn" class="bg-indigo-50 text-indigo-600 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-indigo-100 transition-colors hidden shrink-0"><i class="fab fa-google text-red-500 mr-1"></i>登入</button>
                <button id="logout-btn" class="bg-slate-100 text-slate-500 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-slate-200 transition-colors hidden shrink-0">登出</button>
            </div>
        </header>

        <!-- 無延遲新增輸入框 (加入圖片預覽區) -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-2 mb-8 flex flex-col sticky top-4 z-40 group focus-within:ring-2 focus-within:ring-indigo-200 transition-all">
            <div class="flex flex-col md:flex-row gap-2">
                <div class="relative shrink-0 flex items-center w-full md:w-auto">

                    <button id="verify-key-btn" class="w-full sm:w-auto bg-indigo-100 text-indigo-700 px-3 py-2 rounded-lg text-sm font-bold hover:bg-indigo-200 transition-colors shrink-0 whitespace-nowrap">查詢並指定可用模型</button>

    <!-- 刪除與移動 Modal 區塊 -->
    <div id="confirm-modal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4"><div class="bg-white rounded-2xl w-full max-w-sm p-6 shadow-xl"><h3 class="text-lg font-bold text-slate-800 mb-2 flex items-center gap-2"><i class="fas fa-exclamation-triangle text-amber-500"></i> 確定要刪除嗎？</h3><div class="flex justify-end gap-3 mt-6"><button id="cancel-delete-btn" class="px-4 py-2 rounded-lg font-semibold text-slate-600 hover:bg-slate-100">取消</button><button id="confirm-delete-btn" class="px-4 py-2 rounded-lg font-semibold bg-red-500 text-white hover:bg-red-600">確認刪除</button></div></div></div>
    <div id="confirm-delete-completed-modal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4"><div class="bg-white rounded-2xl w-full max-w-sm p-6 shadow-xl"><h3 class="text-lg font-bold text-slate-800 mb-2 flex items-center gap-2"><i class="fas fa-exclamation-triangle text-rose-500"></i> 刪除所有已完成？</h3><div class="flex justify-end gap-3 mt-6"><button id="cancel-delete-completed-btn" class="px-4 py-2 rounded-lg font-semibold text-slate-600 hover:bg-slate-100">取消</button><button id="confirm-delete-completed-btn" class="px-4 py-2 rounded-lg font-semibold bg-rose-500 text-white hover:bg-rose-600">一鍵清空</button></div></div></div>
    <div id="move-modal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-sm p-6 shadow-xl flex flex-col">
            <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><i class="fas fa-folder-open text-indigo-500"></i> 移動到...</h3>
            <div class="flex flex-col gap-2 mb-6" id="move-options-container">

                <button class="move-option-btn p-3 text-left rounded-xl border border-slate-200 hover:border-purple-500 hover:bg-purple-50 flex items-center gap-3" data-target="learning"><i class="fas fa-book-open text-purple-500 w-6 text-center"></i><span class="font-semibold text-slate-700">待學習/探討資源</span></button>
                <button class="move-option-btn p-3 text-left rounded-xl border border-slate-200 hover:border-amber-500 hover:bg-amber-50 flex items-center gap-3" data-target="ideas"><i class="fas fa-lightbulb text-amber-500 w-6 text-center"></i><span class="font-semibold text-slate-700">點子庫</span></button>

    <div id="edit-modal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4"><div class="bg-white rounded-2xl w-full max-w-sm p-6 shadow-xl flex flex-col"><h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><i class="fas fa-pen text-indigo-500"></i> 編輯碎片</h3><textarea id="edit-input" class="w-full p-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-primary/50 text-sm mb-4 h-32 resize-none custom-scrollbar"></textarea><div class="flex justify-end gap-3"><button id="cancel-edit-btn" class="px-4 py-2 rounded-lg font-semibold text-slate-600 hover:bg-slate-100">取消</button><button id="confirm-edit-btn" class="px-4 py-2 rounded-lg font-semibold bg-indigo-600 text-white hover:bg-indigo-700">儲存</button></div></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Firebase 初始化 ---
        let firebaseConfig;
        let appId = 'my-personal-ai-brain'; 
        if (typeof __firebase_config !== 'undefined') {
            firebaseConfig = JSON.parse(__firebase_config);
            appId = typeof __app_id !== 'undefined' ? __app_id : appId;
        } else {
            firebaseConfig = {
                apiKey: "AIzaSyC30YPS_CkGVBS8IBrq74sBW0pkP1-ev6w",
                authDomain: "my-ai-brain-6867e.firebaseapp.com",
                projectId: "my-ai-brain-6867e",
                storageBucket: "my-ai-brain-6867e.firebasestorage.app",
                messagingSenderId: "755512158785",
                appId: "1:755512158785:web:8376054556e01717f9b4c0"
            };
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const db = getFirestore(app);

        let currentUser = null;
        let currentCategories = [];
        let currentInboxItems = []; 
        let currentTodoItems = [];
        let pendingDeleteTarget = null;
        let pendingMoveTarget = null;
        let pendingEditTarget = null;
        let isHideCompleted = false;
        let isSorting = false; 
        let isInitialInboxLoad = true; 
        let justDropped = false;

        let stagedImageFile = null;

        const confirmModal = document.getElementById('confirm-modal');
        const moveModal = document.getElementById('move-modal');
        const editModal = document.getElementById('edit-modal');
        const editInput = document.getElementById('edit-input');

        const getOrder = (item) => item.order !== undefined ? item.order : item.createdAt;

        
        async function saveCategory(categoryData) {
            if (!currentUser) return;
            const catCol = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'categories');
            if (categoryData.id) {
                const { id, ...data } = categoryData;
                await updateDoc(doc(catCol, id), data);
            } else {
                await addDoc(catCol, categoryData);
            }
        }

        async function deleteCategoryFunc(id) {
            if (!currentUser) return;
            await deleteDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'categories', id));
        }

        function setupCategoryListener(catId, catType, catName, catIcon) {
            const listEl = document.getElementById(`list-${catId}`);
            if (!listEl) return;

        const initDragAndDrop = () => {
            document.querySelectorAll('.sortable-list').forEach(list => {
                new Sortable(list, {
                    group: 'shared', animation: 150, delay: 500, delayOnTouchOnly: true,
                    ghostClass: 'sortable-ghost', dragClass: 'sortable-drag', filter: '.ignore-drag',
                    onStart: function () { document.body.classList.add('is-dragging'); },
                    onChange: function (evt) {
                        document.querySelectorAll('.sortable-list').forEach(el => el.classList.remove('is-dragover'));
                        // ✨ 修復：判斷目標區域是否為原區域，若是跨區才顯示「加入...」遮罩
                        if(evt.to && evt.to !== evt.from) evt.to.classList.add('is-dragover');
                    },
                    onEnd: async function (evt) {
                        document.body.classList.remove('is-dragging');
                        document.querySelectorAll('.sortable-list').forEach(el => el.classList.remove('is-dragover'));
                        
                        justDropped = true; setTimeout(() => justDropped = false, 100);
                        
                        const itemEl = evt.item; const id = itemEl.getAttribute('data-id');
                        const oldCol = evt.from.getAttribute('data-col'); const newCol = evt.to.getAttribute('data-col');
                        if(!id || !currentUser) return;

                        let newOrder = Date.now(); 
                        const prevEl = itemEl.previousElementSibling; const nextEl = itemEl.nextElementSibling;
                        const isValid = (el) => el && el.hasAttribute('data-order');
                        const prevOrder = isValid(prevEl) ? parseFloat(prevEl.getAttribute('data-order')) : null;
                        const nextOrder = isValid(nextEl) ? parseFloat(nextEl.getAttribute('data-order')) : null;

                        if (prevOrder !== null && nextOrder !== null) newOrder = (prevOrder + nextOrder) / 2;
                        else if (prevOrder !== null) newOrder = prevOrder - 1000;
                        else if (nextOrder !== null) newOrder = nextOrder + 1000;

                        try {
                            const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, oldCol, id);
                            if (oldCol === newCol) {
                                if (evt.oldIndex !== evt.newIndex) await updateDoc(docRef, { order: newOrder });
                            } else {
                                const oldSnap = await getDoc(docRef);
                                if (oldSnap.exists()) {
                                    let data = oldSnap.data(); data.order = newOrder;
                                    if(newCol !== 'todos') delete data.completed;
                                    await setDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, newCol, id), data);
                                    await deleteDoc(docRef);
                                }
                            }
                        } catch(err) { console.error(err); }
                    }
                });
            });
        };

            if (!apiKey || autoSetting === 'off') return;
            const now = Date.now(); const lastSortTime = parseInt(localStorage.getItem('lastAutoSortTime') || '0', 10);
            if (autoSetting === 'always' || (autoSetting === 'daily' && now - lastSortTime > 86400000)) {

        function setupRealtimeListeners(userId) {
            const getCol = (colName) => collection(db, 'artifacts', appId, 'users', userId, colName);
            const sortItems = (items) => items.sort((a, b) => getOrder(b) - getOrder(a));

            onSnapshot(getCol('inbox'), (snapshot) => {
                currentInboxItems = []; snapshot.forEach(doc => currentInboxItems.push({ id: doc.id, ...doc.data() }));
                sortItems(currentInboxItems); renderList(currentInboxItems, document.getElementById('inbox-list'), 'inbox');
                document.getElementById('inbox-count').innerText = currentInboxItems.length;
                document.getElementById('ai-sort-btn').disabled = currentInboxItems.length === 0;
                if (isInitialInboxLoad) { isInitialInboxLoad = false; setTimeout(checkAutoSortCondition, 800); }
            });

            onSnapshot(getCol('categories'), async (snapshot) => {
                currentCategories = [];
                snapshot.forEach(doc => currentCategories.push({ id: doc.id, ...doc.data() }));
                
                if (currentCategories.length === 0 && !localStorage.getItem('hasMigratedDefaultCategories')) {
                    localStorage.setItem('hasMigratedDefaultCategories', 'true');

        function renderTodos(items, containerEl) {

            containerEl.innerHTML = '';
            items.forEach(item => {
                const isCompleted = item.completed || false; const textClass = isCompleted ? 'todo-checked' : '';
                const li = document.createElement('li');
                li.className = `bg-white p-3 rounded-xl border border-slate-100 text-slate-700 text-sm flex items-start justify-between shadow-sm group hover:shadow-md transition-shadow cursor-grab active:cursor-grabbing ${isCompleted ? 'todo-item-completed' : ''}`;

                li.innerHTML = `
                    <div class="todo-content flex items-start gap-3 flex-1 min-w-0 cursor-pointer flex-col">
                        <div class="flex items-center gap-3 w-full">
                            <input type="checkbox" ${isCompleted ? 'checked' : ''} class="todo-checkbox w-4 h-4 text-emerald-500 rounded border-slate-300 focus:ring-emerald-500 cursor-pointer shrink-0 pointer-events-auto">
                            <div class="leading-relaxed break-words break-all pr-2 flex-1 transition-all line-clamp-3 whitespace-pre-wrap ${textClass}">${escapeHtml(item.text)}</div>
                        </div>

                    </div>
                    ${getActionButtonsHTML()}`;
                
                const todoContent = li.querySelector('.todo-content');
                const checkbox = li.querySelector('.todo-checkbox');
                
                todoContent.addEventListener('click', async (e) => {
                    if (justDropped) return; 
                    if (e.target.tagName.toLowerCase() === 'img') return;
                    if (e.target !== checkbox) checkbox.checked = !checkbox.checked; 
                    if(currentUser) try { await updateDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, containerEl.getAttribute('data-col'), item.id), { completed: checkbox.checked }); } catch(err) {}
                });
                
                checkbox.addEventListener('click', (e) => e.stopPropagation());
                checkbox.addEventListener('change', async (e) => {
                    if(currentUser) try { await updateDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, containerEl.getAttribute('data-col'), item.id), { completed: e.target.checked }); } catch(err) {}
                });

                attachItemListeners(li, item, containerEl.getAttribute('data-col')); containerEl.appendChild(li);
            });
        }

                const li = document.createElement('li');
                li.className = 'bg-white p-3 rounded-xl border border-slate-100 shadow-sm group hover:shadow-md transition-shadow flex flex-col gap-3 relative cursor-grab active:cursor-grabbing';
                li.setAttribute('data-id', item.id); li.setAttribute('data-order', getOrder(item));
                const safeText = item.text || ''; const urlMatch = safeText.match(/(https?:\/\/[^\s]+)/); let previewHTML = '';

                if (urlMatch) {
                    const url = urlMatch[0]; const ytMatch = url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/);
                    if (ytMatch) {
                        previewHTML = `<a href="${url}" target="_blank" class="block rounded-xl overflow-hidden border border-slate-200 hover:border-rose-300 transition-colors relative group/preview pointer-events-auto"><img src="https://img.youtube.com/vi/${ytMatch[1]}/mqdefault.jpg" class="w-full h-auto object-cover aspect-video"><div class="absolute inset-0 bg-black/20 flex items-center justify-center opacity-80 group-hover/preview:opacity-100 transition-opacity"><i class="fab fa-youtube text-red-500 text-5xl drop-shadow-md bg-white rounded-full"></i></div></a>`;
                    } else if (url.includes('github.com')) {
                        const repoPath = url.replace('https://github.com/', '').split('/').slice(0, 2).join('/');
                        previewHTML = `<a href="${url}" target="_blank" class="flex items-center gap-3 p-3 rounded-xl border border-slate-200 hover:border-slate-400 hover:bg-slate-50 transition-colors text-slate-700 pointer-events-auto"><i class="fab fa-github text-2xl"></i><div class="flex flex-col overflow-hidden"><span class="text-xs text-slate-400">GitHub Repository</span><span class="text-sm font-bold truncate">${repoPath || 'GitHub Link'}</span></div></a>`;
                    } else {
                        previewHTML = `<a href="${url}" target="_blank" class="flex items-center gap-3 p-3 rounded-xl border border-slate-200 hover:border-blue-300 hover:bg-blue-50 transition-colors text-slate-700 pointer-events-auto"><div class="w-10 h-10 rounded-full bg-blue-100 text-blue-500 flex items-center justify-center shrink-0"><i class="fas fa-link"></i></div><div class="flex flex-col overflow-hidden w-full"><span class="text-sm font-semibold truncate text-blue-600">${url}</span><span class="text-xs text-slate-400 truncate">外部網站</span></div></a>`;
                    }
                }

                let textWithoutUrl = safeText; if (urlMatch) textWithoutUrl = safeText.replace(urlMatch[0], '').trim();
                let textHTML = textWithoutUrl ? `<div class="leading-relaxed break-words break-all text-slate-700 text-sm flex-1 line-clamp-3 whitespace-pre-wrap">${escapeHtml(textWithoutUrl)}</div>` : '';

                li.innerHTML = `<div class="flex items-start justify-between gap-2 w-full min-w-0 flex-col"><div class="flex items-center gap-2 flex-1 w-full min-w-0"><i class="fas fa-star text-rose-300 shrink-0"></i>${textHTML}</div>${getImageHTML(item.imageUrl)}</div><div class="absolute right-3 top-3 bg-white/80 rounded-full backdrop-blur-sm pointer-events-auto">${getActionButtonsHTML()}</div>${previewHTML}`;
                attachItemListeners(li, item, 'bookmarks'); containerEl.appendChild(li);
            });
        }

        document.getElementById('cancel-delete-btn').addEventListener('click', () => { confirmModal.classList.add('hidden'); pendingDeleteTarget = null; });
        document.getElementById('confirm-delete-btn').addEventListener('click', async () => {
            if (currentUser && pendingDeleteTarget) {
                const btn = document.getElementById('confirm-delete-btn'); const originalHTML = btn.innerHTML; btn.innerHTML = '<div class="loader w-4 h-4 mx-auto border-t-white border-2"></div>'; btn.disabled = true;
                try { 
                    await deleteDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, pendingDeleteTarget.col, pendingDeleteTarget.id)); 
                } catch(err) {} finally { btn.innerHTML = originalHTML; btn.disabled = false; confirmModal.classList.add('hidden'); pendingDeleteTarget = null; }
            }
        });

        document.getElementById('cancel-move-btn').addEventListener('click', () => { moveModal.classList.add('hidden'); pendingMoveTarget = null; });
        document.querySelectorAll('.move-option-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const targetBtn = e.currentTarget; const targetCol = targetBtn.getAttribute('data-target');
                if (currentUser && pendingMoveTarget) {
                    const originalHTML = targetBtn.innerHTML; targetBtn.innerHTML = '<div class="loader w-5 h-5 mx-auto border-t-slate-500"></div>';
                    try {
                        const { id, ...dataToMove } = pendingMoveTarget.data;
                        if (targetCol !== 'todos' && dataToMove.completed !== undefined) delete dataToMove.completed;
                        dataToMove.order = Date.now(); 
                        await addDoc(collection(db, 'artifacts', appId, 'users', currentUser.uid, targetCol), dataToMove);
                        await deleteDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, pendingMoveTarget.col, pendingMoveTarget.id));
                    } catch(err) {} finally { targetBtn.innerHTML = originalHTML; moveModal.classList.add('hidden'); pendingMoveTarget = null; }
                }
            });
        });

        document.getElementById('cancel-edit-btn').addEventListener('click', () => { editModal.classList.add('hidden'); pendingEditTarget = null; });
        document.getElementById('confirm-edit-btn').addEventListener('click', async () => {
            if (currentUser && pendingEditTarget) {
                const newText = document.getElementById('edit-input').value.trim(); if (!newText) return;
                const btn = document.getElementById('confirm-edit-btn'); const originalHTML = btn.innerHTML; btn.innerHTML = '<div class="loader w-4 h-4 mx-auto border-t-white border-2"></div>'; btn.disabled = true;
                try { await updateDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, pendingEditTarget.col, pendingEditTarget.id), { text: newText }); } catch(err) {} finally { btn.innerHTML = originalHTML; btn.disabled = false; editModal.classList.add('hidden'); pendingEditTarget = null; }
            }
        });

        // ==========================================
        // ✨ ImgBB API 圖片上傳與表單提交流程
        // ==========================================
        const ideaInput = document.getElementById('idea-input');
        const imageUploadInput = document.getElementById('image-upload-input');
        const imagePreviewContainer = document.getElementById('image-preview-container');
        const imagePreviewImg = document.getElementById('image-preview-img');
        const removeImageBtn = document.getElementById('remove-image-btn');

        ideaInput.addEventListener('input', function() { this.style.height = '40px'; this.style.height = (this.scrollHeight) + 'px'; });
        
        ideaInput.addEventListener('keydown', function(e) { 
            if (e.key === 'Enter' && !e.shiftKey) { 
                // 改用觸控裝置偵測，避免電腦上的小視窗預覽時誤判為手機
                const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
                if (isTouchDevice) return; // 觸控裝置 (手機/平板) 允許預設的換行行為
                
                e.preventDefault(); 
                document.getElementById('submit-btn').click(); // 模擬點擊送出按鈕
            } 
        });
        
        document.getElementById('paste-btn').addEventListener('click', async () => {
            try { const text = await navigator.clipboard.readText(); ideaInput.value += text; ideaInput.dispatchEvent(new Event('input')); ideaInput.focus(); } catch (err) { alert("無法自動讀取剪貼簿，請手動貼上。"); }
        });

        ideaInput.addEventListener('paste', (e) => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let index in items) {
                const item = items[index];
                if (item.kind === 'file' && item.type.startsWith('image/')) {
                    const blob = item.getAsFile();
                    e.preventDefault(); 
                    handleImageStaging(blob);
                    break;
                }
            }
        });

        document.getElementById('upload-image-btn').addEventListener('click', () => { imageUploadInput.click(); });
        imageUploadInput.addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) handleImageStaging(e.target.files[0]);
        });

        function handleImageStaging(file) {
            const imgbbKey = localStorage.getItem('imgbbApiKey');
            if (!imgbbKey) {
                alert("請先點擊右上角「⚙️ 系統設定」，填寫免費的 ImgBB API Key 才能解鎖圖片上傳功能！");
                document.getElementById('settings-modal').classList.remove('hidden');
                return;
            }
            
            if (file.size > 32 * 1024 * 1024) { alert("圖片太大了，ImgBB 限制最大 32MB！"); return; }
            
            stagedImageFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                imagePreviewImg.src = e.target.result;
                imagePreviewContainer.classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }

        removeImageBtn.addEventListener('click', () => {
            stagedImageFile = null; imageUploadInput.value = '';
            imagePreviewContainer.classList.add('hidden'); imagePreviewImg.src = '';
        });

        document.getElementById('add-form').addEventListener('submit', async (e) => {
            e.preventDefault(); if (!currentUser) return;
            const text = ideaInput.value.trim(); 
            
            if (!text && !stagedImageFile) return;

            const targetCollection = document.getElementById('category-select').value; 
            const btn = document.getElementById('submit-btn'); 
            btn.disabled = true; btn.innerHTML = '<div class="loader w-4 h-4 border-2"></div>';

            let uploadedImageUrl = null;

            try {
                if (stagedImageFile) {
                    const imgbbKey = localStorage.getItem('imgbbApiKey');
                    const formData = new FormData();
                    formData.append('image', stagedImageFile);

                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbKey}`, {
                        method: 'POST', body: formData
                    });
                    
                    const data = await res.json();
                    if (data.success) {
                        uploadedImageUrl = data.data.url;
                    } else {
                        throw new Error(data.error?.message || "ImgBB 上傳失敗");
                    }
                }

                const newDocData = { 
                    text: text || "（附加圖片）", 
                    createdAt: Date.now(), order: Date.now() 
                };

                if (uploadedImageUrl) newDocData.imageUrl = uploadedImageUrl;

                await addDoc(collection(db, 'artifacts', appId, 'users', currentUser.uid, targetCollection), newDocData);
                
                ideaInput.value = ''; ideaInput.style.height = '40px';
                removeImageBtn.click(); 

            } catch (error) { 
                console.error("送出失敗", error); alert("送出失敗：" + error.message);
            } finally { 
                btn.disabled = false; btn.innerHTML = '<i class="fas fa-paper-plane text-xs"></i>'; ideaInput.focus(); 
            }
        });

        // ==========================================
        // ✨ 設定邏輯與 AI 分類
        // ==========================================
        document.getElementById('settings-btn').addEventListener('click', () => {
            document.getElementById('api-key-input').value = localStorage.getItem('geminiApiKey') || '';
            document.getElementById('imgbb-key-input').value = localStorage.getItem('imgbbApiKey') || '';
            document.getElementById('auto-sort-select').value = localStorage.getItem('autoSortSetting') || 'off'; 
            document.getElementById('settings-modal').classList.remove('hidden');
        });
        document.getElementById('close-modal-btn').addEventListener('click', () => document.getElementById('settings-modal').classList.add('hidden'));
        
        document.getElementById('verify-key-btn').addEventListener('click', async () => {
            const key = document.getElementById('api-key-input').value.trim(); if(!key) return;
            const btn = document.getElementById('verify-key-btn'); btn.disabled = true; btn.innerHTML = '<div class="loader w-4 h-4 border-2 border-t-indigo-700 mx-auto"></div>';
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
                const data = await res.json();
                const models = data.models.filter(m => m.supportedGenerationMethods && m.supportedGenerationMethods.includes('generateContent'));
                const select = document.getElementById('model-select'); select.innerHTML = '';
                models.forEach(m => { const opt = document.createElement('option'); opt.value = m.name.replace('models/', ''); opt.textContent = m.displayName || m.name; select.appendChild(opt); });
                document.getElementById('model-select-container').classList.remove('hidden');
            } catch(e) {} finally { btn.disabled = false; btn.innerText = '查詢並指定可用模型'; }
        });

        document.getElementById('save-settings-btn').addEventListener('click', () => {
            const geminiKey = document.getElementById('api-key-input').value.trim();
            const imgbbKey = document.getElementById('imgbb-key-input').value.trim();
            if(geminiKey) { localStorage.setItem('geminiApiKey', geminiKey); if (document.getElementById('model-select').value) localStorage.setItem('geminiModel', document.getElementById('model-select').value); }
            if(imgbbKey) { localStorage.setItem('imgbbApiKey', imgbbKey); }
            localStorage.setItem('autoSortSetting', document.getElementById('auto-sort-select').value);
            document.getElementById('settings-modal').classList.add('hidden');
        });

        document.getElementById('ai-sort-btn').addEventListener('click', async () => {
            if (isSorting || currentInboxItems.length === 0 || !currentUser) return;
            const apiKey = localStorage.getItem('geminiApiKey'); const targetModel = localStorage.getItem('geminiModel') || 'gemini-2.5-flash';
            if (!apiKey) { document.getElementById('settings-modal').classList.remove('hidden'); return; }

            isSorting = true; const btn = document.getElementById('ai-sort-btn'); btn.disabled = true; const originalHTML = btn.innerHTML; btn.innerHTML = `<div class="loader w-4 h-4 border-2 border-t-white"></div> <span id="ai-sort-text">AI 背景整理中...</span>`;
            try {
                const itemsToCategorize = [...currentInboxItems]; 
                const texts = itemsToCategorize.map(item => item.text);
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${targetModel}:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `請分類以下 JSON Array：1. todos 2. learning 3. ideas 4. bookmarks。請保留原換行符號。\n\n${JSON.stringify(texts)}` }] }],
                        generationConfig: { responseMimeType: "application/json", responseSchema: { type: "OBJECT", properties: { todos: { type: "ARRAY", items: { type: "STRING" } }, learning: { type: "ARRAY", items: { type: "STRING" } }, ideas: { type: "ARRAY", items: { type: "STRING" } }, bookmarks: { type: "ARRAY", items: { type: "STRING" } } } } }
                    })
                });
                const result = JSON.parse((await response.json()).candidates[0].content.parts[0].text);
                
                const assignItems = async (sortedTexts, colName) => {
                    if(!sortedTexts) return;
                    for (const text of sortedTexts) {
                        const originalIndex = itemsToCategorize.findIndex(item => item.text === text);
                        let docData = { text: text, createdAt: Date.now(), order: Date.now() };
                        if (originalIndex !== -1) {
                            if (itemsToCategorize[originalIndex].imageUrl) docData.imageUrl = itemsToCategorize[originalIndex].imageUrl;
                            itemsToCategorize.splice(originalIndex, 1);
                        }
                        await addDoc(collection(db, 'artifacts', appId, 'users', currentUser.uid, colName), docData);
                    }
                };
                
                await Promise.all([ assignItems(result.todos, 'todos'), assignItems(result.learning, 'learning'), assignItems(result.ideas, 'ideas'), assignItems(result.bookmarks, 'bookmarks') ]);
                for (const item of [...currentInboxItems]) await deleteDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'inbox', item.id));
            } catch (error) { console.error(error); } finally { isSorting = false; btn.disabled = false; btn.innerHTML = originalHTML; }
        });
    </script>
</body>
</html>
