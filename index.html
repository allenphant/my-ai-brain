<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的筆記區</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <!-- Editor.js Core and Plugins -->
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/editorjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/header@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/list@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/checklist@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/quote@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/marker@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/editorjs-undo@latest"></script>
    <script src="https://bernardo-castilho.github.io/DragDropTouch/DragDropTouch.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#6366f1', background: '#f8fafc', surface: '#ffffff' }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar:hover::-webkit-scrollbar-thumb { background-color: #94a3b8; }
        .custom-scrollbar { scrollbar-width: thin; scrollbar-color: #cbd5e1 transparent; }
        
        .loader { border-top-color: transparent; animation: spin 1s linear infinite; border-radius: 50%; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .todo-checked { text-decoration: line-through; color: #94a3b8; }
        .hide-completed-mode .todo-item-completed { display: none !important; }

        .sortable-ghost { opacity: 0.3; }
        .sortable-drag { cursor: grabbing !important; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); pointer-events: none !important; }
        
        body.is-dragging { user-select: none; -webkit-user-select: none; }
        body.is-dragging .sortable-list { min-height: 80px; }
        body.is-dragging .sidebar-link:hover {
            background-color: #e0e7ff !important;
            color: #4f46e5 !important;
            box-shadow: inset 0 0 0 1.5px #6366f1 !important;
        }
        
        .category-wrapper { scroll-margin-top: 120px; }
        body.is-dragging .category-wrapper { position: relative; }
        body.is-dragging .category-wrapper::after {
            content: '\f067  加入 ' attr(data-name);
            font-family: "Font Awesome 6 Free", "Noto Sans TC";
            font-weight: 900;
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            font-size: 1.25rem; color: #6366f1; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(4px);
            border: 3px dashed #6366f1; border-radius: 1rem; z-index: 50; opacity: 0; pointer-events: none; transition: all 0.2s ease;
        }
        body.is-dragging .category-wrapper.is-dragover::after { opacity: 1; }
        body.side-layout-active.editor-open #main-app-container {
            width: 50vw;
            max-width: 50vw;
            margin-left: 0;
            padding-right: 2rem;
            transition: all 0.3s ease;
        }
        @media (hover: none) and (pointer: coarse) {
            body.side-layout-active.editor-open #main-app-container {
                width: 100vw;
                max-width: 100vw;
                padding-right: 1rem;
            }
            body.side-layout-active #editor-container {
                width: 100vw;
            }
            #editor-layout-btn { display: none !important; }
        }
        body.side-layout-active #editor-modal {
            pointer-events: none;
        }
        body.side-layout-active #editor-backdrop {
            display: none;
        }
        body.side-layout-active #editor-container {
            pointer-events: auto;
            position: fixed;
            right: 0;
            box-shadow: -10px 0 25px -5px rgba(0,0,0,0.1);
        }

        /* 修正 EditorJS 在窄螢幕 (或側邊欄) 時，+ 號跑到右邊的問題 */
        .codex-editor--narrow .ce-toolbar__actions {
            right: 100% !important;
            left: auto !important;
        }
        .codex-editor--narrow .ce-block {
            padding-right: 0 !important;
        }

        /* Mobile Sidebar Drawer */
        @media (max-width: 767px) {
            #sidebar {
                display: flex !important;
                position: fixed;
                top: 0;
                left: 0;
                height: 100vh;
                max-height: 100vh;
                width: 280px;
                border-radius: 0;
                z-index: 100;
                transform: translateX(-100%);
                transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            #sidebar.is-open {
                transform: translateX(0);
                box-shadow: 4px 0 20px rgba(0,0,0,0.15);
            }
        }

        /* Sidebar Nav Link Styles */
        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 0.625rem;
            padding: 0.5rem 0.625rem;
            border-radius: 0.625rem;
            font-size: 0.8125rem;
            font-weight: 500;
            color: #64748b;
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            transition: background-color 0.15s, color 0.15s;
        }
        .sidebar-link:hover {
            background-color: #f1f5f9;
            color: #334155;
        }
        .sidebar-link.is-active {
            background-color: #eef2ff;
            color: #4f46e5;
            font-weight: 600;
        }
        .sidebar-link .sidebar-link-icon {
            width: 1.125rem;
            text-align: center;
            font-size: 0.875rem;
            flex-shrink: 0;
        }
        .sidebar-link .sidebar-link-text {
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            flex: 1;
        }
    /* Sidebar + Editor side-layout: compress page-wrapper on desktop */
    body.side-layout-active.editor-open #page-wrapper {
        max-width: calc(50vw - 2rem);
        margin-left: 0;
    }
    /* On mobile, sidebar sits above editor backdrop */
    @media (max-width: 767px) {
        body.editor-open #sidebar.is-open {
            z-index: 95;
        }
    }
    </style>
</head>
<body class="bg-background text-slate-800 font-sans min-h-screen p-4 md:p-8 relative">

    <div class="max-w-7xl mx-auto flex gap-6 items-start" id="page-wrapper">

        <!-- Sidebar -->
        <aside id="sidebar" class="hidden md:flex flex-col w-56 shrink-0 sticky top-4 self-start bg-white rounded-2xl border border-slate-200 shadow-sm p-4 max-h-[calc(100vh-2rem)] overflow-y-auto custom-scrollbar">
            <div class="flex items-center justify-between mb-4 pb-3 border-b border-slate-100">
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest">快速跳轉</h2>
                <button id="sidebar-close-btn" class="md:hidden text-slate-400 hover:text-slate-600 w-6 h-6 flex items-center justify-center rounded-lg hover:bg-slate-100">
                    <i class="fas fa-times text-sm"></i>
                </button>
            </div>
            <nav id="sidebar-nav" class="flex flex-col gap-1">
                <!-- Populated by JS -->
            </nav>
        </aside>

        <!-- Main Content (keep id="main-app-container" as existing JS references it) -->
        <div class="flex-1 min-w-0" id="main-app-container">
        <!-- 頂部標題區 -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
            <div class="flex items-center justify-between w-full md:w-auto">
                <div class="flex items-center gap-2 md:gap-3">
                    <button id="sidebar-toggle-btn" class="md:hidden text-slate-500 hover:text-indigo-600 transition-colors p-2 rounded-lg hover:bg-slate-100 mr-1" aria-label="開啟導覽">
                        <i class="fas fa-bars text-lg"></i>
                    </button>
                    <i class="fas fa-brain text-2xl md:text-3xl text-indigo-500"></i>
                    <h1 class="text-xl md:text-2xl font-bold tracking-tight text-slate-800">我的筆記區</h1>
                </div>
                <button id="manage-categories-btn" class="md:ml-4 text-indigo-500 hover:text-indigo-700 transition-colors bg-indigo-50 p-2 rounded-full shadow-sm border border-indigo-100"><i class="fas fa-tags"></i></button>
                <button id="settings-btn" class="md:ml-4 text-slate-400 hover:text-slate-600 transition-colors bg-white p-2 rounded-full shadow-sm border border-slate-100"><i class="fas fa-cog"></i></button>
            </div>
            
            <div class="flex items-center gap-3 bg-white px-4 py-2 rounded-xl border border-slate-200 shadow-sm w-full md:w-auto justify-between md:justify-end">
                <div class="flex items-center gap-2">
                    <span id="auth-status" class="w-2.5 h-2.5 rounded-full bg-amber-500 shadow-inner shrink-0"></span>
                    <span id="auth-text" class="text-slate-600 text-sm font-medium truncate max-w-[150px]">等待登入...</span>
                </div>
                <button id="login-btn" class="bg-indigo-50 text-indigo-600 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-indigo-100 transition-colors hidden shrink-0"><i class="fab fa-google text-red-500 mr-1"></i>登入</button>
                <button id="logout-btn" class="bg-slate-100 text-slate-500 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-slate-200 transition-colors hidden shrink-0">登出</button>
            </div>
        </header>

        <!-- 無延遲新增輸入框 (加入圖片預覽區) -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-2 mb-8 flex flex-col sticky top-4 z-40 group focus-within:ring-2 focus-within:ring-indigo-200 transition-all">
            <div class="flex flex-col md:flex-row gap-2">
                <div class="relative shrink-0 flex items-center w-full md:w-auto" id="custom-category-select-wrapper">
                    <button type="button" id="custom-category-btn" class="w-full md:w-auto bg-indigo-50 text-indigo-700 font-semibold px-4 py-2.5 rounded-xl text-sm border-none outline-none cursor-pointer pr-10 hover:bg-indigo-100 transition-colors flex items-center gap-2 whitespace-nowrap">
                        <i class="fas fa-inbox text-indigo-500 w-4 text-center"></i> <span id="custom-category-text">收件匣 (由 AI 分類)</span>
                    </button>
                    <i class="fas fa-chevron-down absolute right-4 text-indigo-500 text-xs pointer-events-none opacity-60"></i>
                    
                    <div id="custom-category-menu" class="hidden absolute top-full left-0 mt-2 w-56 bg-white rounded-xl shadow-lg border border-slate-100 py-2 z-50 overflow-y-auto max-h-64 custom-scrollbar">
                        <!-- Options populated via JS -->
                    </div>
                    
                    <input type="hidden" id="category-select" value="inbox">
                </div>
                
                <form id="add-form" class="flex-1 flex gap-2 w-full items-end md:items-center relative">
                    <textarea id="idea-input" placeholder="貼上文字或截圖..." class="w-full bg-slate-50 md:bg-transparent border border-slate-100 md:border-none rounded-xl md:rounded-none px-3 py-2 md:py-2 focus:outline-none text-slate-700 placeholder-slate-400 font-medium resize-none overflow-hidden custom-scrollbar min-h-[40px] max-h-[150px] flex-1 leading-relaxed" rows="1"></textarea>
                    
                    <div class="flex items-center gap-1 shrink-0 pb-1 md:pb-0">
                        <input type="file" id="image-upload-input" accept="image/*" class="hidden">
                        <button type="button" id="upload-image-btn" class="text-slate-400 hover:text-indigo-500 transition-colors p-2 rounded-lg hover:bg-slate-100" title="上傳圖片">
                            <i class="fas fa-image"></i>
                        </button>
                        <button type="button" id="paste-btn" class="text-slate-400 hover:text-indigo-500 transition-colors p-2 rounded-lg hover:bg-slate-100" title="貼上剪貼簿內容">
                            <i class="fas fa-clipboard"></i>
                        </button>
                        <button type="submit" id="submit-btn" class="bg-indigo-600 text-white w-10 h-10 rounded-xl hover:bg-indigo-700 transition-all shadow-md flex items-center justify-center shrink-0 disabled:opacity-50">
                            <i class="fas fa-paper-plane text-xs"></i>
                        </button>
                    </div>
                </form>
            </div>
            
            <!-- 圖片預覽區 -->
            <div id="image-preview-container" class="hidden mt-2 pt-2 border-t border-slate-100 pl-2 md:pl-[180px]">
                <div class="relative inline-block">
                    <img id="image-preview-img" src="" class="h-20 w-auto rounded-lg border border-slate-200 object-cover">
                    <button id="remove-image-btn" class="absolute -top-2 -right-2 bg-rose-500 text-white w-5 h-5 rounded-full flex items-center justify-center text-[10px] hover:bg-rose-600 shadow-sm z-20"><i class="fas fa-times"></i></button>
                </div>
            </div>
        </div>

        <!-- 收件匣整合區塊 -->
        <div class="category-wrapper bg-gradient-to-br from-indigo-50/50 to-purple-50/50 rounded-2xl shadow-sm border border-indigo-100 p-4 md:p-5 mb-8 flex flex-col relative overflow-hidden" data-name="收件匣">

            
            <!-- AI 魔法分類大按鈕 -->
            <div class="mb-4 flex justify-between items-center z-10 relative">
                <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                    <i class="fas fa-inbox text-indigo-500"></i> 收件匣
                    <span id="inbox-count" class="bg-indigo-200 text-indigo-800 text-xs px-2 py-0.5 rounded-full font-bold">0</span>
                </h2>
                <button id="ai-sort-btn" class="text-xs font-bold text-indigo-600 hover:text-indigo-800 bg-white border border-indigo-200 hover:bg-indigo-50 px-3 py-1.5 rounded-md transition-colors flex items-center gap-1 focus:outline-none shadow-sm disabled:opacity-50 disabled:cursor-not-allowed">
                    <i class="fas fa-magic"></i> <span id="ai-sort-text" class="hidden sm:inline">AI 魔法整理</span>
                </button>
            </div>

            <!-- 未分類清單 -->
            <ul id="inbox-list" class="sortable-list space-y-3 min-h-[50px] custom-scrollbar z-10 relative" data-col="inbox" data-name="收件匣">
                <li class="bg-white/80 p-4 rounded-xl border border-indigo-100 text-slate-500 text-sm text-center ignore-drag backdrop-blur-sm">載入中...</li>
            </ul>
        </div>

        <!-- 網格佈局區：動態分類 -->
        <div id="main-grid-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        </div>
        </div><!-- end #main-app-container -->
    </div><!-- end #page-wrapper -->

    <!-- Modals -->
    <div id="category-manager-modal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-3xl p-6 shadow-xl max-h-[90vh] overflow-y-auto custom-scrollbar flex flex-col md:flex-row gap-6 relative">
            <!-- List View -->
            <div class="flex-1 border-r border-slate-100 pr-4">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-bold text-slate-800">🏷️ 管理分類</h3>
                    <button id="add-category-btn" class="text-indigo-600 bg-indigo-50 px-3 py-1 rounded-lg text-sm font-bold hover:bg-indigo-100"><i class="fas fa-plus"></i> 新增</button>
                </div>
                <ul id="category-manager-list" class="space-y-2"></ul>
            </div>
            <!-- Edit Form -->
            <div class="flex-1 flex flex-col" id="category-edit-form">
                <h4 class="font-bold text-slate-800 mb-4" id="category-form-title">新增分類</h4>
                <input type="hidden" id="cat-id-input">
                
                <label class="block text-sm font-semibold text-slate-700 mb-1">分類名稱</label>
                <input type="text" id="cat-name-input" class="w-full px-3 py-2 border border-slate-300 rounded-lg mb-4" placeholder="例如：購物清單">
                
                <label class="block text-sm font-semibold text-slate-700 mb-1">選擇圖示</label>
                <div id="cat-icon-picker" class="grid grid-cols-6 sm:grid-cols-8 gap-2 mb-4 max-h-44 overflow-y-auto custom-scrollbar p-2 border border-slate-200 rounded-lg bg-slate-50">
                    <!-- Icons will be populated via JS -->
                </div>
                <input type="hidden" id="cat-icon-input" value="fas fa-folder">
                
                <label class="block text-sm font-semibold text-slate-700 mb-1">模式切換</label>
                <div class="flex gap-2 mb-4">
                    <button type="button" class="cat-type-btn flex-1 py-2 rounded-lg border text-sm font-semibold text-indigo-600 border-indigo-500 bg-indigo-50 active-type" data-type="text">📝 純文字</button>
                    <button type="button" class="cat-type-btn flex-1 py-2 rounded-lg border text-sm font-semibold text-slate-600 border-slate-200" data-type="todo">✅ 待辦清單</button>
                    <button type="button" class="cat-type-btn flex-1 py-2 rounded-lg border text-sm font-semibold text-slate-600 border-slate-200" data-type="bookmark">🔗 連結庫</button>
                </div>
                <input type="hidden" id="cat-type-input" value="text">
                
                <label class="block text-sm font-semibold text-slate-700 mb-1 flex justify-between items-center">
                    <span>AI 魔法規則 (選填)</span>
                    <button type="button" id="ai-suggest-rule-btn" class="text-xs text-indigo-600 bg-indigo-50 px-2 py-1 rounded hover:bg-indigo-100"><i class="fas fa-sparkles"></i> AI 幫我寫</button>
                </label>
                <textarea id="cat-prompt-rule-input" class="w-full px-3 py-2 border border-slate-300 rounded-lg flex-1 min-h-[80px] mb-4 text-sm" placeholder="告訴 AI 什麼樣的內容該被分進來..."></textarea>
                
                <div class="flex justify-between mt-auto pt-4 border-t border-slate-100">
                    <button type="button" id="cat-delete-btn" class="text-rose-600 text-sm font-bold hover:text-rose-700 hidden">刪除分類</button>
                    <div class="flex gap-2 ml-auto">
                        <button type="button" id="cat-cancel-btn" class="px-4 py-2 rounded-lg font-semibold text-slate-600 hover:bg-slate-100">取消</button>
                        <button type="button" id="cat-save-btn" class="px-4 py-2 rounded-lg font-semibold bg-indigo-600 text-white hover:bg-indigo-700 w-20 flex items-center justify-center">儲存</button>
                    </div>
                </div>
            </div>
            <button id="close-category-modal-btn" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center"><i class="fas fa-times"></i></button>
        </div>
    </div>
    <div id="settings-modal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-md p-6 shadow-xl max-h-[90vh] overflow-y-auto custom-scrollbar">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-slate-800">⚙️ 系統設定</h3>
                <button id="close-modal-btn" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="mb-4">
                <label class="block text-sm font-semibold text-slate-700 mb-2">Google Gemini API Key</label>
                <div class="flex flex-col sm:flex-row gap-2 mb-1">
                    <input type="password" id="api-key-input" placeholder="AIzaSy..." class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary/50 outline-none text-sm font-mono">
                    <button id="verify-key-btn" class="w-full sm:w-auto bg-indigo-100 text-indigo-700 px-3 py-2 rounded-lg text-sm font-bold hover:bg-indigo-200 transition-colors shrink-0 whitespace-nowrap">查詢並指定可用模型</button>
                </div>
                <a href="https://aistudio.google.com/app/apikey" target="_blank" class="text-xs text-indigo-500 hover:underline"><i class="fas fa-external-link-alt"></i> 前往 Google AI Studio 獲取免費 Key</a>
            </div>
            
            <div class="mb-4 hidden" id="model-select-container">
                <label class="block text-sm font-semibold text-slate-700 mb-2">選擇 AI 模型</label>
                <select id="model-select" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary/50 outline-none text-sm bg-white cursor-pointer"></select>
            </div>

            <!-- ImgBB API Key 設定區塊 -->
            <div class="mb-4 pt-4 border-t border-slate-100">
                <label class="block text-sm font-semibold text-slate-700 mb-2 flex items-center gap-2">
                    ImgBB API Key <span class="bg-emerald-100 text-emerald-700 text-[10px] px-2 py-0.5 rounded">免費圖床</span>
                </label>
                <input type="password" id="imgbb-key-input" placeholder="填寫即可解鎖貼上圖片功能..." class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary/50 outline-none text-sm font-mono mb-1">
                <a href="https://api.imgbb.com/" target="_blank" class="text-xs text-indigo-500 hover:underline"><i class="fas fa-external-link-alt"></i> 前往 ImgBB 獲取免費 Key</a>
            </div>

            <div class="mb-6 pt-4 border-t border-slate-100">
                <label class="block text-sm font-semibold text-slate-700 mb-2 flex justify-between">自動整理 (懶人觸發) <i class="fas fa-robot text-indigo-400"></i></label>
                <select id="auto-sort-select" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary/50 outline-none text-sm bg-white cursor-pointer">
                    <option value="off">關閉 (僅手動整理)</option>
                    <option value="always">每次開啟網頁時</option>
                    <option value="daily">每天開啟時整理一次</option>
                </select>
            </div>
            <button id="save-settings-btn" class="w-full bg-slate-800 text-white py-2 rounded-lg font-semibold hover:bg-slate-700 transition-colors">儲存設定</button>
        </div>
    </div>

    <!-- 刪除與移動 Modal 區塊 -->

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Firebase 初始化 ---
        let firebaseConfig;
        let appId = 'my-personal-ai-brain'; 
        if (typeof __firebase_config !== 'undefined') {
            firebaseConfig = JSON.parse(__firebase_config);
            appId = typeof __app_id !== 'undefined' ? __app_id : appId;
        } else {
            firebaseConfig = {
                apiKey: "AIzaSyC30YPS_CkGVBS8IBrq74sBW0pkP1-ev6w",
                authDomain: "my-ai-brain-6867e.firebaseapp.com",
                projectId: "my-ai-brain-6867e",
                storageBucket: "my-ai-brain-6867e.firebasestorage.app",
                messagingSenderId: "755512158785",
                appId: "1:755512158785:web:8376054556e01717f9b4c0"
            };
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const db = getFirestore(app);

        let currentUser = null;
        let currentCategories = [];
        let currentInboxItems = []; 
        let currentTodoItems = [];
        let pendingDeleteTarget = null;
        let pendingMoveTarget = null;
        let pendingEditTarget = null;
        let isHideCompleted = false;
        let isSorting = false; 
        let isInitialInboxLoad = true; 
        let justDropped = false;

        let stagedImageFile = null;

        const confirmModal = document.getElementById('confirm-modal');
        const moveModal = document.getElementById('move-modal');
        const editModal = document.getElementById('edit-modal');
        const editInput = document.getElementById('edit-input');

        const getOrder = (item) => item.order !== undefined ? item.order : item.createdAt;

        
        async function saveCategory(categoryData) {
            if (!currentUser) return;
            const catCol = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'categories');
            if (categoryData.id) {
                const { id, ...data } = categoryData;
                await updateDoc(doc(catCol, id), data);
            } else {
                await addDoc(catCol, categoryData);
            }
        }

        async function deleteCategoryFunc(id) {
            if (!currentUser) return;
            await deleteDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'categories', id));
            showToast('已刪除分類');
        }

        function setupCategoryListener(catId, catType, catName, catIcon) {
            const listEl = document.getElementById(`list-${catId}`);
            if (!listEl) return;
            onSnapshot(collection(db, 'artifacts', appId, 'users', currentUser.uid, catId), (snapshot) => {
                const items = []; snapshot.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
                items.sort((a, b) => getOrder(b) - getOrder(a));
                
                if (catType === 'todo') {
                    renderTodos(items, listEl, catId);
                } else if (catType === 'bookmark') {
                    renderBookmarks(items, listEl, catId);
                } else {
                    renderList(items, listEl, catId, `${catIcon} text-slate-400`);
                }
            });
        }

        const initDragAndDrop = () => {
            document.querySelectorAll('.sortable-list').forEach(list => {
                new Sortable(list, {
                    group: 'shared', animation: 150, delay: 150, delayOnTouchOnly: true, fallbackTolerance: 5, forceFallback: true, fallbackClass: 'sortable-fallback',
                    ghostClass: 'sortable-ghost', dragClass: 'sortable-drag', filter: '.ignore-drag',
                    onStart: function () { document.body.classList.add('is-dragging'); },
                    onChange: function (evt) {
                        document.querySelectorAll('.is-dragover').forEach(el => el.classList.remove('is-dragover'));
                        // ✨ 修復：判斷目標區域是否為原區域，若是跨區才顯示「加入...」遮罩
                        if(evt.to && evt.to !== evt.from) {
                            const wrapper = evt.to.closest('.category-wrapper');
                            if(wrapper) wrapper.classList.add('is-dragover');
                        }
                    },
                    onEnd: async function (evt) {
                        document.body.classList.remove('is-dragging');
                        document.querySelectorAll('.is-dragover').forEach(el => el.classList.remove('is-dragover'));
                        
                        justDropped = true; setTimeout(() => justDropped = false, 100);
                        
                        const itemEl = evt.item; const id = itemEl.getAttribute('data-id');
                        const oldCol = evt.from.getAttribute('data-col'); 
                        let newCol = evt.to.getAttribute('data-col');
                        let droppedOnSidebar = false;

                        if (evt.originalEvent) {
                            const touch = evt.originalEvent.touches ? (evt.originalEvent.touches[0] || evt.originalEvent.changedTouches[0]) : evt.originalEvent;
                            if (touch) {
                                let dragEl = document.querySelector('.sortable-drag');
                                if (dragEl) dragEl.style.display = 'none';
                                const targetEl = document.elementFromPoint(touch.clientX, touch.clientY);
                                if (dragEl) dragEl.style.display = '';
                                
                                const sidebarLink = targetEl ? targetEl.closest('.sidebar-link') : null;
                                if (sidebarLink) {
                                    const targetCol = sidebarLink.getAttribute('data-target');
                                    if (targetCol && targetCol !== oldCol) {
                                        newCol = targetCol;
                                        droppedOnSidebar = true;
                                        itemEl.remove();
                                    } else if (targetCol === oldCol) {
                                        return;
                                    }
                                }
                            }
                        }

                        if(!id || !currentUser) return;

                        let newOrder = Date.now(); 
                        if (!droppedOnSidebar) {
                            const prevEl = itemEl.previousElementSibling; const nextEl = itemEl.nextElementSibling;
                            const isValid = (el) => el && el.hasAttribute('data-order');
                            const prevOrder = isValid(prevEl) ? parseFloat(prevEl.getAttribute('data-order')) : null;
                            const nextOrder = isValid(nextEl) ? parseFloat(nextEl.getAttribute('data-order')) : null;

                            if (prevOrder !== null && nextOrder !== null) newOrder = (prevOrder + nextOrder) / 2;
                            else if (prevOrder !== null) newOrder = prevOrder - 1000;
                            else if (nextOrder !== null) newOrder = nextOrder + 1000;
                        }

                        try {
                            const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, oldCol, id);
                            if (oldCol === newCol) {
                                if (evt.oldIndex !== evt.newIndex) await updateDoc(docRef, { order: newOrder });
                            } else {
                                const oldSnap = await getDoc(docRef);
                                if (oldSnap.exists()) {
                                    let data = oldSnap.data(); data.order = newOrder;
                                    if(newCol !== 'todos') delete data.completed;
                                    await setDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, newCol, id), data);
                                    await deleteDoc(docRef);
                                    showToast('已永久刪除');
                                }
                            }
                        } catch(err) { console.error(err); }
                    }
                });
            });
        };
        initDragAndDrop();


        const initAuth = async () => { if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) try { await signInWithCustomToken(auth, __initial_auth_token); } catch (e) {} };
        initAuth();

        document.getElementById('login-btn').addEventListener('click', async () => { try { await signInWithPopup(auth, provider); } catch (e) { alert("登入失敗：" + e.message); } });
        document.getElementById('logout-btn').addEventListener('click', async () => { try { await signOut(auth); window.location.reload(); } catch (e) {} });


        const categoryModal = document.getElementById('category-manager-modal');
        const catIcons = [
            'fas fa-folder', 'fas fa-star', 'fas fa-heart', 'fas fa-bolt', 'fas fa-check-square', 'fas fa-lightbulb', 'fas fa-bookmark', 'fas fa-book',
            'fas fa-briefcase', 'fas fa-graduation-cap', 'fas fa-laptop-code', 'fas fa-chart-line', 'fas fa-bullseye', 'fas fa-code', 'fas fa-server', 'fas fa-robot',
            'fas fa-shopping-cart', 'fas fa-plane', 'fas fa-music', 'fas fa-video', 'fas fa-gamepad', 'fas fa-dumbbell', 'fas fa-utensils', 'fas fa-coffee',
            'fas fa-pen', 'fas fa-sticky-note', 'fas fa-list', 'fas fa-tasks', 'fas fa-calendar-alt', 'fas fa-clock', 'fas fa-microphone', 'fas fa-camera',
            'fas fa-piggy-bank', 'fas fa-car', 'fas fa-house', 'fas fa-gift', 'fas fa-paw', 'fas fa-seedling', 'fas fa-map-marker-alt', 'fas fa-fire'
        ];
        
        document.getElementById('manage-categories-btn').addEventListener('click', () => {
            categoryModal.classList.remove('hidden');
            resetCategoryForm();
        });
        document.getElementById('close-category-modal-btn').addEventListener('click', () => categoryModal.classList.add('hidden'));
        document.getElementById('cat-cancel-btn').addEventListener('click', resetCategoryForm);
        document.getElementById('add-category-btn').addEventListener('click', resetCategoryForm);

        function renderIconPicker() {
            const picker = document.getElementById('cat-icon-picker');
            picker.innerHTML = '';
            catIcons.forEach(icon => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = `aspect-square w-full sm:max-w-[3rem] mx-auto rounded-xl border flex items-center justify-center text-xl transition-all ${document.getElementById('cat-icon-input').value === icon ? 'bg-indigo-100 border-indigo-500 text-indigo-600 shadow-sm scale-110 z-10' : 'bg-white border-slate-200 text-slate-500 hover:bg-slate-50 hover:scale-105'}`;
                btn.innerHTML = `<i class="${icon}"></i>`;
                btn.onclick = () => {
                    document.getElementById('cat-icon-input').value = icon;
                    renderIconPicker();
                };
                picker.appendChild(btn);
            });
        }

        document.querySelectorAll('.cat-type-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.cat-type-btn').forEach(b => {
                    b.classList.remove('border-indigo-500', 'bg-indigo-50', 'text-indigo-600', 'active-type');
                    b.classList.add('border-slate-200', 'text-slate-600');
                });
                const target = e.currentTarget;
                target.classList.remove('border-slate-200', 'text-slate-600');
                target.classList.add('border-indigo-500', 'bg-indigo-50', 'text-indigo-600', 'active-type');
                document.getElementById('cat-type-input').value = target.getAttribute('data-type');
            });
        });

        function resetCategoryForm() {
            document.getElementById('cat-id-input').value = '';
            document.getElementById('cat-name-input').value = '';
            document.getElementById('cat-prompt-rule-input').value = '';
            document.getElementById('cat-icon-input').value = 'fas fa-folder';
            document.getElementById('cat-delete-btn').classList.add('hidden');
            document.getElementById('category-form-title').innerText = '新增分類';
            document.querySelector('.cat-type-btn[data-type="text"]').click();
            renderIconPicker();
        }

        document.getElementById('cat-save-btn').addEventListener('click', async (e) => {
            const name = document.getElementById('cat-name-input').value;
            if (!name) return alert('請輸入分類名稱');
            const btn = e.currentTarget;
            btn.disabled = true;
            btn.innerHTML = '<div class="loader w-4 h-4 border-t-white border-2"></div>';
            
            const id = document.getElementById('cat-id-input').value;
            const data = {
                name,
                icon: document.getElementById('cat-icon-input').value,
                type: document.getElementById('cat-type-input').value,
                promptRule: document.getElementById('cat-prompt-rule-input').value,
                order: id ? currentCategories.find(c => c.id === id).order : Date.now()
            };
            if(id) data.id = id;
            
            await saveCategory(data);
            resetCategoryForm();
            btn.disabled = false;
            btn.innerText = '儲存';
        });

        document.getElementById('cat-delete-btn').addEventListener('click', async () => {
            if(!confirm('確定要刪除這個分類嗎？該分類底下的筆記將不會被刪除，但會需要重新分類。')) return;
            const id = document.getElementById('cat-id-input').value;
            await deleteCategoryFunc(id);
            resetCategoryForm();
        });

        function renderCategoryManagerList(categories) {
            const listEl = document.getElementById('category-manager-list');
            listEl.innerHTML = '';
            categories.forEach(cat => {
                const li = document.createElement('li');
                li.className = 'p-3 bg-slate-50 rounded-lg flex items-center justify-between cursor-pointer hover:bg-slate-100 border border-slate-200';
                li.innerHTML = `<span><i class="${cat.icon} mr-2 text-slate-500"></i> ${escapeHtml(cat.name)}</span> <i class="fas fa-edit text-slate-400"></i>`;
                li.addEventListener('click', () => populateCategoryForm(cat));
                listEl.appendChild(li);
            });
            // We should ideally add SortableJS here to manage category order, but for simplicity we rely on manual list for now.
            // Let's initialize Sortable on the manager list
            new Sortable(listEl, {
                animation: 150, delay: 150, delayOnTouchOnly: true, fallbackTolerance: 5, forceFallback: true, fallbackClass: 'sortable-fallback',
                onEnd: async function(evt) {
                    const itemEl = evt.item;
                    const oldIndex = evt.oldIndex;
                    const newIndex = evt.newIndex;
                    if (oldIndex === newIndex) return;
                    
                    // Update all orders sequentially for simplicity
                    const newOrderList = Array.from(listEl.children);
                    for (let i = 0; i < newOrderList.length; i++) {
                        const catName = newOrderList[i].querySelector('span').innerText.trim();
                        const cat = currentCategories.find(c => c.name === catName);
                        if(cat) await saveCategory({id: cat.id, order: i * 1000});
                    }
                }
            });
        }

        // ✨ Sidebar Index
        function renderSidebar(categories) {
            const nav = document.getElementById('sidebar-nav');
            if (!nav) return;
            nav.innerHTML = '';

            // Static: Inbox
            nav.appendChild(createSidebarLink('inbox', 'fas fa-inbox', '收件匣'));

            // Divider
            if (categories.length > 0) {
                const divider = document.createElement('div');
                divider.className = 'my-2 border-t border-slate-100';
                nav.appendChild(divider);
            }

            // Dynamic categories
            categories.forEach(cat => {
                nav.appendChild(createSidebarLink(cat.id, cat.icon, cat.name));
            });
        }

        function createSidebarLink(targetId, iconClass, labelText) {
            const btn = document.createElement('button');
            btn.className = 'sidebar-link';
            btn.setAttribute('data-target', targetId);
            const icon = document.createElement('i');
            iconClass.split(' ').filter(Boolean).forEach(cls => icon.classList.add(cls));
            icon.classList.add('sidebar-link-icon');
            const span = document.createElement('span');
            span.className = 'sidebar-link-text';
            span.textContent = labelText;
            btn.appendChild(icon);
            btn.appendChild(span);
            btn.addEventListener('click', () => {
                const targetEl = targetId === 'inbox'
                    ? document.querySelector('[data-col="inbox"]')?.closest('.category-wrapper')
                    : document.getElementById(`list-${targetId}`)?.closest('.category-wrapper');
                if (targetEl) {
                    targetEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
                closeSidebar();
            });
            return btn;
        }

        function openSidebar() {
            document.getElementById('sidebar')?.classList.add('is-open');
            document.getElementById('sidebar-backdrop')?.classList.remove('hidden');
        }

        function closeSidebar() {
            document.getElementById('sidebar')?.classList.remove('is-open');
            document.getElementById('sidebar-backdrop')?.classList.add('hidden');
        }

        let sidebarObserver = null;

        function initSidebarObserver() {
            if (sidebarObserver) sidebarObserver.disconnect();

            const wrappers = document.querySelectorAll('.category-wrapper');
            if (wrappers.length === 0) return;

            sidebarObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (!entry.isIntersecting) return;
                    const listEl = entry.target.querySelector('[data-col]');
                    const colId = listEl ? listEl.getAttribute('data-col') : null;
                    if (!colId) return;

                    document.querySelectorAll('.sidebar-link').forEach(link => {
                        link.classList.toggle('is-active', link.getAttribute('data-target') === colId);
                    });
                });
            }, {
                rootMargin: '-10% 0px -60% 0px',
                threshold: 0
            });

            wrappers.forEach(wrapper => sidebarObserver.observe(wrapper));
        }

        document.getElementById('sidebar-toggle-btn')?.addEventListener('click', openSidebar);
        document.getElementById('sidebar-close-btn')?.addEventListener('click', closeSidebar);
        document.getElementById('sidebar-backdrop')?.addEventListener('click', closeSidebar);

        function populateCategoryForm(cat) {

            renderIconPicker();

        document.getElementById('ai-suggest-rule-btn').addEventListener('click', async (e) => {
            const btn = e.currentTarget;
            const catName = document.getElementById('cat-name-input').value;
            if(!catName) return alert('請先輸入分類名稱！');
            
            const apiKey = document.getElementById('api-key-input').value || localStorage.getItem('geminiApiKey');
            if (!apiKey) return alert("請先設定 Gemini API Key！");
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            
            try {
                const targetModel = localStorage.getItem('geminiModel') || 'gemini-2.5-flash';
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${targetModel}:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `你是一個 AI 助理。請為一個名為「${catName}」的筆記本分類，寫出一句簡短的分類判斷規則。例如：「只要提到買、補貨、超市、五金行，就放這裡。」。請直接輸出規則字串，不要加引號。` }] }]
                    })
                });
                const data = await response.json();
                if(data.error) throw new Error(data.error.message);
                const rule = data.candidates[0].content.parts[0].text.trim();
                document.getElementById('cat-prompt-rule-input').value = rule;
            } catch(err) {
                alert('生成失敗：' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sparkles"></i> AI 幫我寫';
            }
        });

            grid.innerHTML = '';

                const wrapper = document.createElement('div');
                wrapper.className = 'category-wrapper bg-surface border border-slate-200 rounded-2xl p-6 shadow-sm hover:shadow-md transition-shadow flex flex-col h-full';

                const header = document.createElement('h2');

                const addBtnHtml = `
                    <button class="add-item-btn-dynamic text-slate-400 hover:text-indigo-600 bg-slate-50 hover:bg-indigo-50 border border-slate-200 w-7 h-7 rounded-md transition-colors flex flex-shrink-0 items-center justify-center focus:outline-none shadow-sm" data-col="${cat.id}" data-name="${escapeHtml(cat.name || '')}" title="在此分類新增">
                        <i class="fas fa-plus text-xs"></i>
                    </button>

                let controlsHtml = '';

                    controlsHtml = `<div class="flex items-center gap-2">${addBtnHtml}</div>`;

                header.innerHTML = titleHtml;
                wrapper.appendChild(header);
                
                const list = document.createElement('ul');

                list.className = 'sortable-list space-y-3 max-h-96 overflow-y-auto custom-scrollbar pr-2 flex-1';
                list.setAttribute('data-col', cat.id);
                list.setAttribute('data-name', cat.name);
                wrapper.appendChild(list);
                
                grid.appendChild(wrapper);
                setupCategoryListener(cat.id, cat.type, cat.name, cat.icon);
                
                if (cat.type === 'todo') {
                    const toggleBtn = wrapper.querySelector('.toggle-completed-btn-dynamic');
                    if (toggleBtn) {
                        let isHidden = false;
                        toggleBtn.addEventListener('click', () => {
                            isHidden = !isHidden;
                            const icon = toggleBtn.querySelector('.toggle-icon');
                            const text = toggleBtn.querySelector('.toggle-text');
                            if (isHidden) {

                                text.innerText = '顯示已完成';

                                text.classList.remove('text-indigo-600', 'font-semibold');

                    const delBtn = wrapper.querySelector('.delete-completed-btn-dynamic');

                            const itemsEl = list.querySelectorAll('.todo-item-completed');

        function setupCustomSelect() {
            const btn = document.getElementById('custom-category-btn');
            const menu = document.getElementById('custom-category-menu');
            
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                menu.classList.toggle('hidden');
            });
            
            document.addEventListener('click', (e) => {
                if (!menu.contains(e.target) && !btn.contains(e.target)) {
                    menu.classList.add('hidden');
                }
            });
            
            menu.addEventListener('click', (e) => {
                const optionBtn = e.target.closest('button[data-value]');
                if (optionBtn) {
                    const value = optionBtn.getAttribute('data-value');
                    const text = optionBtn.querySelector('span').innerText;
                    const iconClass = optionBtn.querySelector('i').className;
                    
                    document.getElementById('category-select').value = value;
                    document.getElementById('custom-category-text').innerText = text;
                    document.getElementById('custom-category-btn').querySelector('i').className = iconClass;
                    
                    menu.classList.add('hidden');
                }
            });
        }
        setupCustomSelect();

            const menu = document.getElementById('custom-category-menu');
            const val = select.value;
