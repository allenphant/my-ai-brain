<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的筆記區</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#6366f1', background: '#f8fafc', surface: '#ffffff' }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        
        /* 客製化、優雅的滾動軸 */
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar:hover::-webkit-scrollbar-thumb { background-color: #94a3b8; }
        .custom-scrollbar { scrollbar-width: thin; scrollbar-color: #cbd5e1 transparent; }
        
        .loader { border-top-color: transparent; animation: spin 1s linear infinite; border-radius: 50%; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .todo-checked { text-decoration: line-through; color: #94a3b8; }
        .hide-completed-mode .todo-item-completed { display: none !important; }
    </style>
</head>
<body class="bg-background text-slate-800 font-sans min-h-screen p-4 md:p-8 relative">

    <div class="max-w-5xl mx-auto">
        <!-- 頂部標題區 (RWD 重構) -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
            <div class="flex items-center justify-between w-full md:w-auto">
                <div class="flex items-center gap-2 md:gap-3">
                    <i class="fas fa-brain text-2xl md:text-3xl text-indigo-500"></i>
                    <h1 class="text-xl md:text-2xl font-bold tracking-tight text-slate-800">我的筆記區</h1>
                </div>
                <button id="settings-btn" class="md:ml-4 text-slate-400 hover:text-slate-600 transition-colors bg-white p-2 rounded-full shadow-sm border border-slate-100"><i class="fas fa-cog"></i></button>
            </div>
            
            <div class="flex items-center gap-3 bg-white px-4 py-2 rounded-xl border border-slate-200 shadow-sm w-full md:w-auto justify-between md:justify-end">
                <div class="flex items-center gap-2">
                    <span id="auth-status" class="w-2.5 h-2.5 rounded-full bg-amber-500 shadow-inner shrink-0"></span>
                    <span id="auth-text" class="text-slate-600 text-sm font-medium truncate max-w-[150px]">等待登入...</span>
                </div>
                <button id="login-btn" class="bg-indigo-50 text-indigo-600 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-indigo-100 transition-colors hidden shrink-0"><i class="fab fa-google text-red-500 mr-1"></i>登入</button>
                <button id="logout-btn" class="bg-slate-100 text-slate-500 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-slate-200 transition-colors hidden shrink-0">登出</button>
            </div>
        </header>

        <!-- 無延遲新增輸入框 (RWD 重構) -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-2 mb-8 flex flex-col md:flex-row gap-2 sticky top-4 z-40 group focus-within:ring-2 focus-within:ring-indigo-200 transition-all">
            <div class="relative shrink-0 flex items-center w-full md:w-auto">
                <select id="category-select" class="w-full md:w-auto bg-indigo-50 text-indigo-700 font-semibold px-4 py-2.5 rounded-xl text-sm border-none outline-none cursor-pointer appearance-none pr-10 hover:bg-indigo-100 transition-colors">
                    <option value="inbox">📥 收件匣 (由 AI 分類)</option>
                    <option value="todos">✅ 待辦事項</option>
                    <option value="learning">📚 待學習/探討</option>
                    <option value="ideas">💡 點子庫</option>
                    <option value="bookmarks">📌 收藏網址</option>
                </select>
                <i class="fas fa-chevron-down absolute right-4 text-indigo-500 text-xs pointer-events-none opacity-60 group-hover:opacity-100 transition-opacity"></i>
            </div>
            
            <form id="add-form" class="flex-1 flex gap-2 w-full items-end md:items-center relative">
                <!-- 將 input 改為 textarea 支援多行輸入 -->
                <textarea id="idea-input" placeholder="丟個點子、待辦或網址給我... (按 Enter 送出，Shift+Enter 換行)" class="w-full bg-slate-50 md:bg-transparent border border-slate-100 md:border-none rounded-xl md:rounded-none px-3 py-2 md:py-2 focus:outline-none text-slate-700 placeholder-slate-400 font-medium resize-none overflow-hidden custom-scrollbar min-h-[40px] max-h-[150px] flex-1 leading-relaxed" rows="1"></textarea>
                
                <div class="flex items-center gap-1 shrink-0 pb-1 md:pb-0">
                    <!-- 新增貼上按鈕 -->
                    <button type="button" id="paste-btn" class="text-slate-400 hover:text-indigo-500 transition-colors p-2 rounded-lg hover:bg-slate-100" title="貼上剪貼簿內容">
                        <i class="fas fa-clipboard"></i>
                    </button>
                    <button type="submit" id="submit-btn" class="bg-indigo-600 text-white w-10 h-10 rounded-xl hover:bg-indigo-700 transition-all shadow-md flex items-center justify-center shrink-0 disabled:opacity-50">
                        <i class="fas fa-paper-plane text-xs"></i>
                    </button>
                </div>
            </form>
        </div>

        <!-- AI 魔法分類大按鈕 -->
        <div class="mb-8 bg-gradient-to-r from-indigo-50 to-purple-50 rounded-2xl p-4 border border-indigo-100 flex justify-between items-start md:items-center flex-col md:flex-row gap-4">
            <div>
                <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                    <i class="fas fa-inbox text-indigo-500"></i> 收件匣 (未分類碎片)
                    <span id="inbox-count" class="bg-indigo-100 text-indigo-700 text-xs px-2 py-0.5 rounded-full font-bold">0</span>
                </h2>
            </div>
            <button id="ai-sort-btn" class="w-full md:w-auto bg-white border border-indigo-200 text-indigo-600 px-5 py-2.5 rounded-xl font-bold hover:bg-indigo-50 hover:shadow-sm transition-all flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                <i class="fas fa-magic"></i> <span id="ai-sort-text">AI 魔法整理</span>
            </button>
        </div>

        <!-- 未分類清單 -->
        <ul id="inbox-list" class="space-y-3 mb-8 min-h-[50px] custom-scrollbar">
            <li class="bg-white/80 p-4 rounded-xl border border-indigo-100 text-slate-500 text-sm text-center">載入中...</li>
        </ul>

        <!-- 網格佈局區：四大分類 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- ✅ 待辦事項 -->
            <div class="bg-surface border border-slate-200 rounded-2xl p-6 shadow-sm hover:shadow-md transition-shadow">
                <h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center justify-between">
                    <div class="flex items-center">
                        <i class="fas fa-check-square text-emerald-500 mr-2 text-xl"></i>待辦事項
                    </div>
                    <div class="flex items-center gap-2">
                        <!-- 新增：刪除所有已完成按鈕 -->
                        <button id="delete-completed-btn" class="text-xs font-normal text-rose-500 hover:text-rose-700 bg-rose-50 border border-rose-200 hover:bg-rose-100 px-2 py-1 rounded-md transition-colors flex items-center gap-1 focus:outline-none shadow-sm opacity-50 cursor-not-allowed">
                            <i class="fas fa-trash-alt"></i> <span class="hidden sm:inline">清空已完成</span>
                        </button>
                        <!-- 隱藏已完成按鈕 -->
                        <button id="toggle-completed-btn" class="text-xs font-normal text-slate-500 hover:text-slate-800 bg-slate-50 border border-slate-200 hover:bg-slate-100 px-2 py-1 rounded-md transition-colors flex items-center gap-1 focus:outline-none shadow-sm">
                            <i class="fas fa-eye-slash" id="toggle-completed-icon"></i> <span id="toggle-completed-text">隱藏已完成</span>
                        </button>
                    </div>
                </h2>
                <!-- 修改 max-h-60 為 max-h-96 讓電腦版捲軸更明顯 -->
                <ul id="todos-list" class="space-y-3 max-h-96 overflow-y-auto custom-scrollbar pr-2">
                    <li class="text-sm text-slate-400 italic">載入中...</li>
                </ul>
            </div>

            <!-- 📚 待學習/探討資源 -->
            <div class="bg-surface border border-slate-200 rounded-2xl p-6 shadow-sm hover:shadow-md transition-shadow">
                <h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center"><i class="fas fa-book-open text-purple-500 mr-2 text-xl"></i>待學習/探討資源</h2>
                <ul id="learning-list" class="space-y-3 max-h-96 overflow-y-auto custom-scrollbar pr-2">
                    <li class="text-sm text-slate-400 italic">載入中...</li>
                </ul>
            </div>

            <!-- 💡 點子庫 -->
            <div class="bg-surface border border-slate-200 rounded-2xl p-6 shadow-sm hover:shadow-md transition-shadow">
                <h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center"><i class="fas fa-lightbulb text-amber-500 mr-2 text-xl"></i>點子庫</h2>
                <ul id="ideas-list" class="space-y-3 max-h-96 overflow-y-auto custom-scrollbar pr-2">
                    <li class="text-sm text-slate-400 italic">載入中...</li>
                </ul>
            </div>

            <!-- 📌 收藏貼文/影片 -->
            <div class="bg-surface border border-slate-200 rounded-2xl p-6 shadow-sm hover:shadow-md transition-shadow">
                <h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center"><i class="fas fa-bookmark text-rose-500 mr-2 text-xl"></i>收藏貼文/影片</h2>
                <ul id="bookmarks-list" class="space-y-3 max-h-96 overflow-y-auto custom-scrollbar pr-2">
                    <li class="text-sm text-slate-400 italic">載入中...</li>
                </ul>
            </div>
        </div>
    </div>

    <!-- API 金鑰設定 Modal -->
    <div id="settings-modal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-md p-6 shadow-xl max-h-[90vh] overflow-y-auto custom-scrollbar">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-slate-800">⚙️ 系統設定</h3>
                <button id="close-modal-btn" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times"></i></button>
            </div>
            <div class="mb-4">
                <label class="block text-sm font-semibold text-slate-700 mb-2">Google Gemini API Key</label>
                <div class="flex gap-2 mb-2">
                    <input type="password" id="api-key-input" placeholder="AIzaSy..." class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary/50 outline-none text-sm font-mono">
                    <button id="verify-key-btn" class="bg-indigo-100 text-indigo-700 px-3 py-2 rounded-lg text-sm font-bold hover:bg-indigo-200 transition-colors shrink-0">驗證載入</button>
                </div>
                <p class="text-xs text-slate-500 mt-2">填入 API Key 才能啟用魔法整理。</p>
            </div>
            
            <div class="mb-4 hidden" id="model-select-container">
                <label class="block text-sm font-semibold text-slate-700 mb-2">選擇 AI 模型</label>
                <select id="model-select" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary/50 outline-none text-sm bg-white cursor-pointer"></select>
            </div>

            <!-- 自動整理設定 -->
            <div class="mb-6">
                <label class="block text-sm font-semibold text-slate-700 mb-2 flex justify-between">
                    自動整理 (懶人觸發) 
                    <i class="fas fa-robot text-indigo-400"></i>
                </label>
                <select id="auto-sort-select" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary/50 outline-none text-sm bg-white cursor-pointer">
                    <option value="off">關閉 (僅手動整理)</option>
                    <option value="always">每次開啟網頁時</option>
                    <option value="daily">每天開啟時整理一次</option>
                </select>
                <p class="text-[10px] text-slate-400 mt-1">當您開啟網頁時，系統會在背景自動執行分類。</p>
            </div>

            <button id="save-settings-btn" class="w-full bg-slate-800 text-white py-2 rounded-lg font-semibold hover:bg-slate-700 transition-colors">
                儲存設定
            </button>
        </div>
    </div>

    <!-- 刪除確認 Modal -->
    <div id="confirm-modal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-sm p-6 shadow-xl max-h-[90vh] overflow-y-auto custom-scrollbar">
            <h3 class="text-lg font-bold text-slate-800 mb-2 flex items-center gap-2">
                <i class="fas fa-exclamation-triangle text-amber-500"></i> 確定要刪除嗎？
            </h3>
            <p class="text-sm text-slate-500 mb-6">這個碎片將會被永久刪除，無法復原。</p>
            <div class="flex justify-end gap-3">
                <button id="cancel-delete-btn" class="px-4 py-2 rounded-lg font-semibold text-slate-600 hover:bg-slate-100 transition-colors">取消</button>
                <button id="confirm-delete-btn" class="px-4 py-2 rounded-lg font-semibold bg-red-500 text-white hover:bg-red-600 transition-colors flex items-center gap-2">
                    <i class="fas fa-trash-alt"></i> 確認刪除
                </button>
            </div>
        </div>
    </div>

    <!-- 新增：清空已完成確認 Modal -->
    <div id="confirm-delete-completed-modal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-sm p-6 shadow-xl max-h-[90vh] overflow-y-auto custom-scrollbar">
            <h3 class="text-lg font-bold text-slate-800 mb-2 flex items-center gap-2">
                <i class="fas fa-exclamation-triangle text-rose-500"></i> 刪除所有已完成？
            </h3>
            <p class="text-sm text-slate-500 mb-6">這將會永久刪除所有已打勾的待辦事項，無法復原。</p>
            <div class="flex justify-end gap-3">
                <button id="cancel-delete-completed-btn" class="px-4 py-2 rounded-lg font-semibold text-slate-600 hover:bg-slate-100 transition-colors">取消</button>
                <button id="confirm-delete-completed-btn" class="px-4 py-2 rounded-lg font-semibold bg-rose-500 text-white hover:bg-rose-600 transition-colors flex items-center gap-2">
                    <i class="fas fa-trash-alt"></i> 一鍵清空
                </button>
            </div>
        </div>
    </div>

    <!-- 移動分類 Modal -->
    <div id="move-modal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-sm p-6 shadow-xl max-h-[90vh] flex flex-col">
            <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                <i class="fas fa-folder-open text-indigo-500"></i> 移動到...
            </h3>
            <div class="flex flex-col gap-2 mb-6 overflow-y-auto custom-scrollbar" id="move-options-container">
                <button class="move-option-btn p-3 text-left rounded-xl border border-slate-200 hover:border-emerald-500 hover:bg-emerald-50 transition-colors flex items-center gap-3" data-target="todos">
                    <i class="fas fa-check-square text-emerald-500 text-xl w-6 text-center"></i>
                    <span class="font-semibold text-slate-700">待辦事項</span>
                </button>
                <button class="move-option-btn p-3 text-left rounded-xl border border-slate-200 hover:border-purple-500 hover:bg-purple-50 transition-colors flex items-center gap-3" data-target="learning">
                    <i class="fas fa-book-open text-purple-500 text-xl w-6 text-center"></i>
                    <span class="font-semibold text-slate-700">待學習/探討資源</span>
                </button>
                <button class="move-option-btn p-3 text-left rounded-xl border border-slate-200 hover:border-amber-500 hover:bg-amber-50 transition-colors flex items-center gap-3" data-target="ideas">
                    <i class="fas fa-lightbulb text-amber-500 text-xl w-6 text-center"></i>
                    <span class="font-semibold text-slate-700">點子庫</span>
                </button>
                <button class="move-option-btn p-3 text-left rounded-xl border border-slate-200 hover:border-rose-500 hover:bg-rose-50 transition-colors flex items-center gap-3" data-target="bookmarks">
                    <i class="fas fa-bookmark text-rose-500 text-xl w-6 text-center"></i>
                    <span class="font-semibold text-slate-700">收藏貼文/影片</span>
                </button>
            </div>
            <div class="flex justify-end">
                <button id="cancel-move-btn" class="px-4 py-2 rounded-lg font-semibold text-slate-600 hover:bg-slate-100 transition-colors w-full">取消</button>
            </div>
        </div>
    </div>

    <!-- 編輯碎片 Modal -->
    <div id="edit-modal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-sm p-6 shadow-xl max-h-[90vh] flex flex-col">
            <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2 shrink-0">
                <i class="fas fa-pen text-indigo-500"></i> 編輯碎片
            </h3>
            <textarea id="edit-input" class="w-full p-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-primary/50 text-sm mb-4 h-32 resize-none flex-1 min-h-[100px] custom-scrollbar"></textarea>
            <div class="flex justify-end gap-3 shrink-0">
                <button id="cancel-edit-btn" class="px-4 py-2 rounded-lg font-semibold text-slate-600 hover:bg-slate-100 transition-colors">取消</button>
                <button id="confirm-edit-btn" class="px-4 py-2 rounded-lg font-semibold bg-indigo-600 text-white hover:bg-indigo-700 transition-colors flex items-center gap-2 shadow-sm">
                    <i class="fas fa-save"></i> 儲存
                </button>
            </div>
        </div>
    </div>

    <!-- Firebase 模組化 SDK & 邏輯 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Firebase 初始化 ---
        let firebaseConfig;
        let appId = 'my-personal-ai-brain'; 
        if (typeof __firebase_config !== 'undefined') {
            firebaseConfig = JSON.parse(__firebase_config);
            appId = typeof __app_id !== 'undefined' ? __app_id : appId;
        } else {
            // 你的專屬金鑰
            firebaseConfig = {
                apiKey: "AIzaSyC30YPS_CkGVBS8IBrq74sBW0pkP1-ev6w",
                authDomain: "my-ai-brain-6867e.firebaseapp.com",
                projectId: "my-ai-brain-6867e",
                storageBucket: "my-ai-brain-6867e.firebasestorage.app",
                messagingSenderId: "755512158785",
                appId: "1:755512158785:web:8376054556e01717f9b4c0",
                measurementId: "G-7HKT6FQ10L"
            };
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const db = getFirestore(app);

        // --- 全域變數 ---
        let currentUser = null;
        let currentInboxItems = []; 
        let currentTodoItems = []; // 新增：保存當前的待辦事項清單以便執行批次刪除
        let pendingDeleteTarget = null;
        let pendingMoveTarget = null;
        let pendingEditTarget = null;
        let isHideCompleted = false;
        let isSorting = false; // AI 整理的執行鎖定狀態
        let isInitialInboxLoad = true; // 紀錄是否為初次載入

        // --- DOM 元素 ---
        const inboxList = document.getElementById('inbox-list');
        const todosList = document.getElementById('todos-list');
        const learningList = document.getElementById('learning-list');
        const ideasList = document.getElementById('ideas-list');
        const bookmarksList = document.getElementById('bookmarks-list');
        
        const aiSortBtn = document.getElementById('ai-sort-btn');
        const aiSortText = document.getElementById('ai-sort-text');
        
        const settingsModal = document.getElementById('settings-modal');
        const apiKeyInput = document.getElementById('api-key-input');
        const verifyKeyBtn = document.getElementById('verify-key-btn');
        const modelSelectContainer = document.getElementById('model-select-container');
        const modelSelect = document.getElementById('model-select');
        const autoSortSelect = document.getElementById('auto-sort-select'); 
        const categorySelect = document.getElementById('category-select');
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');

        const confirmModal = document.getElementById('confirm-modal');
        const cancelDeleteBtn = document.getElementById('cancel-delete-btn');
        const confirmDeleteBtn = document.getElementById('confirm-delete-btn');

        const moveModal = document.getElementById('move-modal');
        const cancelMoveBtn = document.getElementById('cancel-move-btn');
        const moveOptionBtns = document.querySelectorAll('.move-option-btn');

        const editModal = document.getElementById('edit-modal');
        const editInput = document.getElementById('edit-input');
        const cancelEditBtn = document.getElementById('cancel-edit-btn');
        const confirmEditBtn = document.getElementById('confirm-edit-btn');

        const toggleCompletedBtn = document.getElementById('toggle-completed-btn');
        const deleteCompletedBtn = document.getElementById('delete-completed-btn');
        
        const confirmDeleteCompletedModal = document.getElementById('confirm-delete-completed-modal');
        const cancelDeleteCompletedBtn = document.getElementById('cancel-delete-completed-btn');
        const confirmDeleteCompletedBtn = document.getElementById('confirm-delete-completed-btn');

        // --- 刪除所有已完成邏輯 ---
        deleteCompletedBtn.addEventListener('click', () => {
            const hasCompleted = currentTodoItems.some(item => item.completed);
            if (!hasCompleted) return; // 如果按鈕因為被強制點擊，再做一次防呆
            confirmDeleteCompletedModal.classList.remove('hidden');
        });

        cancelDeleteCompletedBtn.addEventListener('click', () => {
            confirmDeleteCompletedModal.classList.add('hidden');
        });

            if (!apiKey) return; 

            const autoSetting = localStorage.getItem('autoSortSetting') || 'off';
            if (autoSetting === 'off') return;

            const now = Date.now();
            const lastSortTime = parseInt(localStorage.getItem('lastAutoSortTime') || '0', 10);

            let shouldTrigger = false;
            if (autoSetting === 'always') {
                shouldTrigger = true;
            } else if (autoSetting === 'daily') {
                if (now - lastSortTime > 86400000) {
                    shouldTrigger = true;
                }
            }

            if (shouldTrigger) {
                localStorage.setItem('lastAutoSortTime', now.toString());
                console.log('🤖 懶人觸發條件達成，開始自動背景整理...');
                performAISort();

        async function loadModels(apiKey, savedModel) {
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                if (!res.ok) throw new Error('API 驗證失敗');
                const data = await res.json();
                const models = data.models.filter(m => m.supportedGenerationMethods && m.supportedGenerationMethods.includes('generateContent'));
                modelSelect.innerHTML = '';
                models.forEach(m => {
                    const option = document.createElement('option'); const modelName = m.name.replace('models/', '');
                    option.value = modelName; option.textContent = m.displayName ? `${m.displayName} (${modelName})` : modelName; modelSelect.appendChild(option);
                });
                if (savedModel && Array.from(modelSelect.options).some(opt => opt.value === savedModel)) modelSelect.value = savedModel;
                else { const flashOpt = Array.from(modelSelect.options).find(opt => opt.value.includes('flash')); if (flashOpt) modelSelect.value = flashOpt.value; }
                modelSelectContainer.classList.remove('hidden');
            } catch (err) { modelSelectContainer.classList.add('hidden'); }
        }

        async function fetchGeminiCategorization(texts, apiKey, modelName) {
            const useModel = modelName || 'gemini-2.5-flash';
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${useModel}:generateContent?key=${apiKey}`;
            
            const promptText = `請將以下使用者丟入的凌亂筆記碎片進行分類。
            1. todos: 待辦事項（帶有行動意圖、生活任務、業務、購買清單）。
            2. learning: 待學習/探討資源（想研究的主題、教學文章、知識點）。
            3. ideas: 點子庫（靈感、專案構想、草稿）。
            4. bookmarks: 收藏的貼文/影片（網址、影片連結、社群貼文、資源網站）。
            
            【重要指示】
            輸入的資料是一個 JSON 陣列。請絕對尊重每一筆獨立的字串（即使裡面包含換行符號 \\n 也不要把它切斷）。請完整輸出原字串。
            
            碎片列表 (JSON Array):
            ${JSON.stringify(texts)}`;

            const payload = {
                contents: [{ parts: [{ text: promptText }] }],
                generationConfig: { responseMimeType: "application/json", responseSchema: { type: "OBJECT", properties: { todos: { type: "ARRAY", items: { type: "STRING" } }, learning: { type: "ARRAY", items: { type: "STRING" } }, ideas: { type: "ARRAY", items: { type: "STRING" } }, bookmarks: { type: "ARRAY", items: { type: "STRING" } } } } }
            };
            const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            if (!response.ok) throw new Error(`API Error ${response.status}`);
            const data = await response.json(); return JSON.parse(data.candidates[0].content.parts[0].text);
        }

        // --- 核心：執行 AI 整理 ---
        async function performAISort() {
            if (isSorting || currentInboxItems.length === 0 || !currentUser) return;
            
            const apiKey = localStorage.getItem('geminiApiKey');
            const targetModel = localStorage.getItem('geminiModel') || 'gemini-2.5-flash';
            if (!apiKey) { settingsModal.classList.remove('hidden'); return; }

            isSorting = true;
            aiSortBtn.disabled = true;
            const originalHTML = aiSortBtn.innerHTML;
            aiSortBtn.innerHTML = `<div class="loader w-4 h-4 border-2 border-t-white"></div> <span id="ai-sort-text">AI 背景整理中...</span>`;

            try {
                const itemsToCategorize = [...currentInboxItems];
                const textsToCategorize = itemsToCategorize.map(item => item.text);
                
                const result = await fetchGeminiCategorization(textsToCategorize, apiKey, targetModel);
                
                const addItems = async (items, colName) => {
                    if(!items || items.length === 0) return;
                    const colRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, colName);
                    for (const text of items) await addDoc(colRef, { text: text, createdAt: Date.now() });
                };
                
                await Promise.all([ addItems(result.todos, 'todos'), addItems(result.learning, 'learning'), addItems(result.ideas, 'ideas'), addItems(result.bookmarks, 'bookmarks') ]);

                for (const item of itemsToCategorize) {
                    await deleteDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'inbox', item.id));
                }
            } catch (error) {
                console.error("AI 整理失敗:", error);
            } finally {
                isSorting = false;
                aiSortBtn.disabled = false;
                aiSortBtn.innerHTML = originalHTML;
            }
        }

        aiSortBtn.addEventListener('click', performAISort);

    </script>
</body>
</html>
